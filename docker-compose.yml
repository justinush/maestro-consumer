services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: maestro
      POSTGRES_PASSWORD: maestro
      POSTGRES_DB: maestro_consumer
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maestro -d maestro_consumer"]
      interval: 2s
      timeout: 5s
      retries: 10
